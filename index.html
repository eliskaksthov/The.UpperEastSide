<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>THE LIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* =============================================
           PROMĚNNÉ BAREV
           Změna hodnoty tady = změna všude v aplikaci.
           ============================================= */
        :root { 
            --bg: #080808; 
            --surface: #111111; 
            --accent: #ff2d55;
            --accent-good: #30d158;
            --text: #ffffff; 
            --muted: #555; 
            --border: #222; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* =============================================
           TĚLO STRÁNKY
           ============================================= */
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg);
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
            color: var(--text); 
            min-height: 100vh; 
            transition: background 0.3s ease;
        }

        /* =============================================
           HORNÍ NAVIGAČNÍ LIŠTA (HEADER)
           Zůstane vždy nahoře při scrollování.
           ============================================= */
        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
            background: rgba(8,8,8,0.85); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); 
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); }
        .nav-toggle { font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
        
        /* =============================================
           HAMBURGER MENU
           Otevírá se po kliknutí na tři čárky.
           ============================================= */
        .menu { 
            display: none; position: fixed; top: 60px; right: 20px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px; z-index: 1000; 
            flex-direction: column; gap: 5px; min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu.active { display: flex; }
        .menu button { 
            background: none; border: none; color: white; padding: 12px 15px; 
            text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; 
            font-size: 18px; border-radius: 8px; transition: 0.2s;
        }
        .menu button:hover { background: var(--border); color: var(--accent); }

        /* =============================================
           HLAVNÍ OBLAST OBSAHU
           Když je lišta otevřená, přidá se spodní
           padding aby obsah nebyl zakrytý lištou.
           ============================================= */
        .content { 
            padding: 80px 20px 60px; 
            max-width: 500px; 
            margin: auto; 
            transition: padding-bottom 0.4s ease;
        }
        .content.input-visible { padding-bottom: 220px; }

        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        /* =============================================
           KARTA S DRBEM
           ============================================= */
        .card { 
            background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px); 
            border: 1px solid var(--border); border-radius: 15px; 
            padding: 15px; margin-bottom: 15px; 
        }

        /* =============================================
           OBRÁZEK V KARTĚ
           object-fit: cover = fotka se ořízne správně,
           nezkreslí se ani nerozmaže.
           ============================================= */
        .gossip-img { 
            width: 100%; 
            max-height: 400px;
            object-fit: cover;
            object-position: center top;
            border-radius: 10px; 
            margin: 10px 0; 
            display: block; 
        }

        .person { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        
        
        /* =============================================
           RANKING
           Řadí se podle počtu zmínek — čím víc zmínek,
           tím vyšší místo v žebříčku.
           ============================================= */
        .ranking-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            margin-bottom: 6px;
        }
        .ranking-subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .rank-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; margin-bottom: 8px;
            border-left: 4px solid var(--border);
        }
        /* Barva okraje podle pořadí */
        .rank-item.rank-1 { border-left-color: #ffd700; }
        .rank-item.rank-2 { border-left-color: #c0c0c0; }
        .rank-item.rank-3 { border-left-color: #cd7f32; }

        .rank-position { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 28px; 
            color: var(--muted); 
            margin-right: 12px; 
            min-width: 30px;
        }
        .rank-count { 
            font-weight: bold; 
            font-size: 16px; 
            color: var(--accent);
            text-align: right;
        }

        /* =============================================
           PŘIHLAŠOVACÍ FORMULÁŘ (ADMIN)
           ============================================= */
        .login-input {
            margin-bottom: 10px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }

        /* =============================================
           ADMIN PANEL
           Vidí ho jen přihlášený admin (třída is-admin).
           ============================================= */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin #loginBtn { display: none !important; }

        /* =============================================
           SIPKA PRO OTEVRENI / ZAVRENI SPODNI LISTY
           Kulatý button uprostřed dole.
           Když je lišta otevřená:
             - sipka se posune nahoru nad lištu
             - otočí se dolů (rotate 180deg)
           ============================================= */
        .input-toggle-btn {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: rgba(17,17,17,0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Přechod: pozice dole + rotace sipky */
            transition: bottom 0.4s cubic-bezier(0.4,0,0.2,1), background 0.2s;
        }
        /* Stav: lišta je otevřená */
        .input-toggle-btn.open {
            bottom: 180px; /* posune se nad lištu */
        }
        .input-toggle-btn:hover { background: rgba(40,40,40,0.9); }

        /* SVG sipka uvnitř tlačítka — otáčí se CSS přechodem */
        .arrow-svg {
            width: 18px;
            height: 18px;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        /* Když je lišta otevřená, sipka se otočí o 180° */
        .input-toggle-btn.open .arrow-svg {
            transform: rotate(180deg);
        }

        /* =============================================
           SPODNÍ LIŠTA PRO PSANÍ DRBŮ
           Výchozí stav: skrytá pod obrazovkou
           (translateY 100% = posun dolů o celou výšku).
           Po kliknutí na sipku se vysune.
           Průhledné pozadí — stejný styl jako ranking.
           ============================================= */
        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(8,8,8,0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); 
            padding: 15px 15px 22px;
            z-index: 101;
            /* Výchozí stav: schovaná */
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        /* Třída open = lišta je viditelná */
        .input-area.open {
            transform: translateY(0);
        }

        .input-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 8px; }

        input[type="text"] { 
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border); 
            color: white; padding: 12px; border-radius: 10px; outline: none;
            font-family: 'DM Sans', sans-serif;
            width: 100%;
        }
        input[type="text"]::placeholder { color: var(--muted); }

        /* =============================================
           VÝBĚR TYPU (POMLUVA / POCHVALA)
           ============================================= */
        .type-selector { display: flex; gap: 8px; }
        .type-btn {
            flex: 1; padding: 10px; border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            cursor: pointer; font-family: 'Bebas Neue', sans-serif;
            font-size: 15px; text-align: center; transition: 0.2s;
        }
        .type-btn.selected-gossip { background: rgba(255,45,85,0.15); color: var(--accent); border-color: var(--accent); }
        .type-btn.selected-praise { background: rgba(48,209,88,0.15); color: var(--accent-good); border-color: var(--accent-good); }

        /* =============================================
           TLACITKO POSLAT
           ============================================= */
        .post-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 12px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; 
            cursor: pointer; font-size: 18px; letter-spacing: 1px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<!-- HORNÍ LIŠTA -->
<div class="header">
    <div class="logo">THE LIST</div>
    <button class="nav-toggle" onclick="toggleMenu()">&#9776;</button>
</div>

<!-- HAMBURGER MENU -->
<div class="menu" id="navMenu">
    <button onclick="showSection('feed')">DRBY</button>
    <button onclick="showSection('ranking')">RANKING</button>
    <button id="loginBtn" onclick="showSection('login')">PRIHLASENI</button>
    <button class="admin-only" onclick="showSection('admin')">ADMIN PANEL</button>
    <button class="admin-only" onclick="logout()" style="color: var(--accent);">ODHLASIT</button>
</div>

<!-- HLAVNÍ OBSAH -->
<div class="content" id="mainContent">

    <div id="feed" class="section active">
        <div id="gossipFeed">Nacitam...</div>
    </div>

    <div id="ranking" class="section">
        <div class="ranking-title">HALL OF FAME</div>
        <div class="ranking-subtitle">Pocet zminek — cim vic, tim vys</div>
        <div id="rankingList"></div>
    </div>

    <div id="login" class="section">
        <div class="card">
            <h2 style="font-family:'Bebas Neue'; margin-bottom:15px;">VSTUP PRO ADMINY</h2>
            <input class="login-input" type="text" id="adminUser" placeholder="Uzivatelske jmeno">
            <input class="login-input" type="password" id="adminPass" placeholder="Heslo">
            <button class="post-btn" onclick="handleLogin()" style="width: 100%;">PRIHLASIT</button>
        </div>
    </div>

    <div id="admin" class="section admin-only">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px;">ADMIN PANEL</h2>
        <div class="card">
            <p style="margin-bottom: 10px;">Zmenit docasne pozadi (jen u tebe):</p>
            <input type="file" id="bgUpload" accept="image/*" onchange="uploadBackground()">
        </div>
        <div id="adminApproveList"></div>
    </div>

</div>

<!-- =============================================
     SIPKA — kliknutím otevře / zavře spodní lištu.
     SVG sipka se otáčí CSS přechodem.
     Zobrazí se jen na feedu (ostatní stránky ji skryjí).
     ============================================= -->
<button class="input-toggle-btn" id="inputToggle" onclick="toggleInputArea()">
    <svg class="arrow-svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
</button>

<!-- =============================================
     SPODNÍ LIŠTA
     Výchozí stav: skrytá. Otevře se sipkou.
     ============================================= -->
<div class="input-area" id="inputArea">
    <div class="input-container">
        <input type="text" id="personInput" placeholder="O kom to je?">
        <input type="text" id="gossipInput" placeholder="Co se stalo?">
        <div class="type-selector">
            <button class="type-btn selected-gossip" id="btnGossip" onclick="selectType('gossip')">POMLUVA</button>
            <button class="type-btn" id="btnPraise" onclick="selectType('praise')">POCHVALA</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <label style="background:rgba(255,255,255,0.07); padding:12px; border-radius:10px; cursor:pointer; flex:1; text-align:center; border:1px solid var(--border); font-size:14px;" id="photoLabel">
                FOTO
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="document.getElementById('photoLabel').innerText='FOTO OK'">
            </label>
            <button class="post-btn" id="postBtn" style="flex:2">POSLAT</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// =============================================
// KONFIGURACE FIREBASE
// =============================================
const firebaseConfig = {
    apiKey: "SEM_VLOZ_SVOJE_API",
    authDomain: "the-list-1efde.firebaseapp.com",
    databaseURL: "https://the-list-1efde-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const gossipRef = ref(db, 'gossip');

// =============================================
// PEVNÝ SEZNAM 5 LIDÍ V RANKINGU
// 
//
// JAK RANKING FUNGUJE:
// Prohledá se pole "O kom to je?" každého schváleného
// příspěvku. Pokud text obsahuje dané jméno (i když
// tam jsou i jiná jména), přičte se 1 zmínka.
// Čím víc zmínek, tím vyšší místo v žebříčku.
// =============================================
const RANKED_PEOPLE = ["Lily", "Mason", "Alison", "Katie", "James"];

// =============================================
// ADMIN PŘIHLAŠOVÁNÍ
// =============================================
const ADMIN_USER = "admin"; 
const ADMIN_PASS = "1234"; // ZDE si změň heslo!

window.handleLogin = () => {
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
        localStorage.setItem('isAdmin', 'true');
        location.reload();
    } else { alert("Spatne jmeno nebo heslo!"); }
};
window.logout = () => { localStorage.removeItem('isAdmin'); location.reload(); };

const isAdmin = localStorage.getItem('isAdmin') === 'true';
if (isAdmin) document.body.classList.add('is-admin');

// =============================================
// POZADÍ
// =============================================
const globalDefaultBg = "https://i.ibb.co/mYrQ8rX/image.png";
window.uploadBackground = function() {
    const file = document.getElementById('bgUpload').files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        localStorage.setItem('customBg', e.target.result);
        document.body.style.backgroundImage = `url(${e.target.result})`;
    };
    reader.readAsDataURL(file);
};
const savedBg = localStorage.getItem('customBg');
document.body.style.backgroundImage = `url(${savedBg || globalDefaultBg})`;

// =============================================
// NAVIGACE
// Při přepnutí na jinou sekci než feed se sipka
// skryje a lišta se zavře.
// =============================================
window.toggleMenu = () => document.getElementById('navMenu').classList.toggle('active');

window.showSection = (id) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    const toggleBtn = document.getElementById('inputToggle');
    if (id === 'feed') {
        toggleBtn.style.display = 'flex';
    } else {
        toggleBtn.style.display = 'none';
        closeInputArea();
    }
};

// =============================================
// SIPKA — OTEVRIT / ZAVRIT SPODNI LISTU
//
// toggleInputArea() přepíná stav (otevřít/zavřít).
// closeInputArea() vždy zavře (používá se i při
// přepnutí na jinou sekci).
//
// Třídy .open na .input-area a .input-toggle-btn
// spustí CSS přechody: lišta se vysune,
// sipka se posune nahoru a otočí.
// =============================================
let inputOpen = false;

window.toggleInputArea = () => {
    inputOpen = !inputOpen;
    const area    = document.getElementById('inputArea');
    const btn     = document.getElementById('inputToggle');
    const content = document.getElementById('mainContent');
    if (inputOpen) {
        area.classList.add('open');
        btn.classList.add('open');
        content.classList.add('input-visible');
    } else {
        closeInputArea();
    }
};

function closeInputArea() {
    inputOpen = false;
    document.getElementById('inputArea').classList.remove('open');
    document.getElementById('inputToggle').classList.remove('open');
    document.getElementById('mainContent').classList.remove('input-visible');
}

// =============================================
// VÝBĚR TYPU (POMLUVA / POCHVALA)
// =============================================
let selectedType = 'gossip';
window.selectType = (type) => {
    selectedType = type;
    document.getElementById('btnGossip').className = 'type-btn' + (type === 'gossip' ? ' selected-gossip' : '');
    document.getElementById('btnPraise').className = 'type-btn' + (type === 'praise' ? ' selected-praise' : '');
};

// =============================================
// ODESLÁNÍ NOVÉHO DRBU
// =============================================
document.getElementById('postBtn').onclick = async () => {
    const text   = document.getElementById('gossipInput').value.trim();
    const person = document.getElementById('personInput').value.trim();
    const file   = document.getElementById('fileInput').files[0];
    if (!text || !person) return alert("Vyplň jmeno i drb!");

    let base64 = "";
    if (file) {
        base64 = await new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });
    }

    await push(gossipRef, {
        text, person, image: base64,
        type: selectedType,
        time: new Date().toLocaleString('cs-CZ'),
        approved: false, likes: 0
    });
    alert("Prispevek byl odeslan ke schvaleni.");
    location.reload();
};

// =============================================
// LIKE, SCHVÁLENÍ, SMAZÁNÍ
// =============================================
window.likePost    = (id, cur) => update(ref(db, 'gossip/' + id), { likes: (cur || 0) + 1 });
window.approvePost = (id)      => update(ref(db, 'gossip/' + id), { approved: true });
window.deletePost  = (id)      => confirm("Smazat?") && remove(ref(db, 'gossip/' + id));

// =============================================
// NAČÍTÁNÍ DAT Z FIREBASE & VYKRESLENÍ
// onValue se spustí automaticky při každé změně dat.
// =============================================
onValue(gossipRef, (snapshot) => {
    const data = snapshot.val() || {};
    const feed       = document.getElementById('gossipFeed');
    const rankingDiv = document.getElementById('rankingList');
    const adminDiv   = document.getElementById('adminApproveList');

    feed.innerHTML     = "";
    adminDiv.innerHTML = "<h3 style='margin:20px 0 10px; font-family:Bebas Neue; color:var(--accent)'>CEKA NA SCHVALENI:</h3>";

    // =============================================
    // POČÍTÁNÍ ZMÍNEK PRO RANKING
    //
    // Pro každý schválený příspěvek se prohledá text
    // pole "O kom to je?" (item.person).
    // Pokud obsahuje jméno ze seznamu RANKED_PEOPLE,
    // přičte se 1 zmínka — i když je v poli víc jmen.
    // =============================================
    const mentionCount = {};
    RANKED_PEOPLE.forEach(n => { mentionCount[n.toLowerCase()] = 0; });

    Object.entries(data).reverse().forEach(([id, item]) => {
        const personText = (item.person || "").toLowerCase();
        const likes      = item.likes || 0;

        if (item.approved) {

            // Projdi všechna sledovaná jména a zkontroluj
            // jestli se vyskytují v poli "O kom to je?"
            RANKED_PEOPLE.forEach(name => {
                if (personText.includes(name.toLowerCase())) {
                    mentionCount[name.toLowerCase()]++;
                }
            });

            // --- FEED ---
            const isPraise  = item.type === 'praise';
            const badgeHtml = isPraise
                ? `<span class="type-badge praise">POCHVALA</span>`
                : `<span class="type-badge gossip">POMLUVA</span>`;

            feed.innerHTML += `
                <div class="card">
                    ${badgeHtml}
                    <div class="person">@${item.person}</div>
                    <div style="line-height:1.5">${item.text}</div>
                    ${item.image ? `<img src="${item.image}" class="gossip-img" loading="lazy">` : ""}
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                        <button class="post-btn" style="padding:5px 15px; font-size:14px;" onclick="likePost('${id}', ${likes})">
                            ${likes} likes
                        </button>
                        ${isAdmin ? `<button onclick="deletePost('${id}')" style="background:none; border:none; color:#555; cursor:pointer; font-size:14px; font-family:'Bebas Neue'">SMAZAT</button>` : ""}
                    </div>
                </div>`;

        } else if (isAdmin) {
            // --- ADMIN: KE SCHVÁLENÍ ---
            const typLabel = item.type === 'praise' ? 'POCHVALA' : 'POMLUVA';
            adminDiv.innerHTML += `
                <div class="card" style="border-color: var(--accent)">
                    <div style="font-size:12px; color:var(--muted); margin-bottom:5px;">${typLabel}</div>
                    <b>@${item.person}</b>: ${item.text}
                    ${item.image ? `<img src="${item.image}" class="gossip-img">` : ""}
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        <button class="post-btn" style="flex:1; background:#28a745; font-size:14px" onclick="approvePost('${id}')">SCHVALIT</button>
                        <button class="post-btn" style="flex:1; background:#dc3545; font-size:14px" onclick="deletePost('${id}')">SMAZAT</button>
                    </div>
                </div>`;
        }
    });

    // =============================================
    // VYKRESLENÍ RANKINGU
    // Seřadí 5 lidí od nejvíce zmíněných.
    // =============================================
    const sorted = RANKED_PEOPLE
        .map(name => [name, mentionCount[name.toLowerCase()] || 0])
        .sort((a, b) => b[1] - a[1]);

    rankingDiv.innerHTML = sorted.map(([name, count], i) => {
        const rankClass = i < 3 ? `rank-${i + 1}` : '';
        const countText = count === 1 ? '1 zminka' : `${count} zminek`;
        return `
        <div class="rank-item ${rankClass}">
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="rank-position">${i + 1}</span>
                <div style="font-weight:bold;">@${name}</div>
            </div>
            <span class="rank-count">${countText}</span>
        </div>`;
    }).join('');
});
</script>
</body>
</html>
