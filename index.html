<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LIST</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #080808;
    --surface: #111;
    --accent: #ff2d55;
    --text: #fff;
    --border: #222;
}

body {
    margin: 0;
    font-family: 'DM Sans';
    color: white;
    background: var(--bg);
    background-size: cover;
    background-position: center;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-between;
    padding: 15px;
    z-index: 100;
}

.logo {
    font-family: 'Bebas Neue';
    color: var(--accent);
    font-size: 26px;
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: black;
    padding: 20px;
    transition: 0.3s;
    z-index: 200;
}

.sidebar.active {
    left: 0;
}

.sidebar div {
    margin: 15px 0;
    cursor: pointer;
}

/* CONTENT */
.content {
    padding: 80px 15px;
}

.card {
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}

/* INPUT */
.input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    padding: 10px;
}

input {
    width: 100%;
    margin-bottom: 5px;
    padding: 10px;
    background: #111;
    border: none;
    color: white;
}

button {
    background: var(--accent);
    border: none;
    padding: 10px;
    color: white;
    width: 100%;
}

.gossip-img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="logo">THE LIST</div>
</div>

<div class="sidebar" id="menu">
    <div onclick="showFeed()">🏠 Feed</div>
    <div onclick="showTop()">🔥 Ranking</div>
    <div onclick="changeBg()">🖼️ Změnit pozadí</div>
</div>

<div class="content" id="feed"></div>

<div class="input-area">
    <input id="person" placeholder="O kom">
    <input id="text" placeholder="Drb">
    <input type="file" id="file">
    <button onclick="addPost()">POST</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
    apiKey: "AIzaSy...",
    databaseURL: "https://the-list-1efde-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = getDatabase(app);
const gossipRef = ref(db, 'gossip');

/* ADMIN PŘÍSTUP (jen 2 lidi) */
const ADMINS = ["device1", "device2"]; 
const myId = localStorage.getItem("id") || Math.random().toString(36);
localStorage.setItem("id", myId);

const isAdmin = ADMINS.includes(myId);

/* MENU */
window.toggleMenu = () => {
    document.getElementById("menu").classList.toggle("active");
};

/* BACKGROUND */
window.changeBg = () => {
    const input = document.createElement("input");
    input.type = "file";

    input.onchange = () => {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = () => {
            document.body.style.backgroundImage = `url(${reader.result})`;
            localStorage.setItem("bg", reader.result);
        };
        reader.readAsDataURL(file);
    };

    input.click();
};

const savedBg = localStorage.getItem("bg");
if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;

/* POST */
window.addPost = async () => {
    const text = document.getElementById("text").value;
    const person = document.getElementById("person").value;
    const file = document.getElementById("file").files[0];

    let img = "";
    if (file) {
        img = await new Promise(res => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.readAsDataURL(file);
        });
    }

    await push(gossipRef, {
        text,
        person,
        img,
        likes: 0,
        approved: false
    });
};

/* LIKE */
window.like = (id, l) => {
    update(ref(db, "gossip/" + id), { likes: (l || 0) + 1 });
};

/* APPROVE */
window.approve = (id) => {
    update(ref(db, "gossip/" + id), { approved: true });
};

/* LOAD */
onValue(gossipRef, snap => {
    const data = snap.val();
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    if (!data) return;

    const arr = Object.entries(data)
        .sort((a,b)=> (b[1].likes||0)-(a[1].likes||0));

    arr.forEach(([id, p]) => {

        if (!p.approved && !isAdmin) return;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>@${p.person}</b><br>
            ${p.text}
            ${p.img ? `<img src="${p.img}" class="gossip-img">` : ""}
            <br>❤️ ${p.likes || 0}
            <button onclick="like('${id}', ${p.likes})">Like</button>
            ${isAdmin && !p.approved ? `<button onclick="approve('${id}')">✔️</button>` : ""}
        `;

        feed.appendChild(div);
    });
});

/* RANKING VIEW */
window.showTop = () => {
    alert("Ranking = seřazeno podle liků 🔥");
};

window.showFeed = () => location.reload();

</script>

</body>
</html>
