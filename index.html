<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>THE LIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080808; --surface: #111111; --accent: #ff2d55; --text: #ffffff; --muted: #555; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 120px; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8,8,8,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 15px 20px; text-align: left; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); }
        
        .content { padding: 90px 20px 20px; max-width: 500px; margin: auto; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; animation: fadeIn 0.5s ease; }
        .gossip-img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }

        .person { color: var(--accent); font-size: 12px; margin-bottom: 5px; }
        .meta { color: var(--muted); font-size: 10px; margin-top: 10px; }

        .actions { margin-top: 10px; display: flex; gap: 10px; align-items: center; }
        .like-btn, .admin-btn {
            background: none;
            border: 1px solid var(--border);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid var(--border); padding: 15px; z-index: 101; }
        .input-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
        input[type="text"] { background: var(--surface); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; outline: none; width: 100%; }
        
        .row { display: flex; gap: 10px; align-items: center; }
        .post-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; cursor: pointer; }
        
        #preview { display: none; width: 40px; height: 40px; border-radius: 5px; object-fit: cover; border: 1px solid var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header"><div class="logo">THE LIST</div></div>
<div class="content" id="gossipFeed">Načítám...</div>

<div class="input-area">
    <div class="input-container">
        <input type="text" id="personInput" placeholder="O kom to je?">
        <input type="text" id="gossipInput" placeholder="Napiš anonymní drb...">
        
        <div class="row">
            <label style="cursor:pointer;">
                📷 <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="showPreview()">
            </label>
            <img id="preview">
            <button class="post-btn" id="postBtn">POST</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "the-list-1efde.firebaseapp.com",
    databaseURL: "https://the-list-1efde-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gossipRef = ref(db, 'gossip');

const isAdmin = prompt("Admin heslo?") === "1234";

// preview
window.showPreview = function() {
    const file = document.getElementById('fileInput').files[0];
    const preview = document.getElementById('preview');
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
    }
}

// post
document.getElementById('postBtn').onclick = async () => {
    const text = document.getElementById('gossipInput').value;
    const person = document.getElementById('personInput').value;
    const file = document.getElementById('fileInput').files[0];

    let base64 = "";
    if (file) {
        base64 = await new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });
    }

    await push(gossipRef, {
        text,
        person,
        image: base64,
        time: new Date().toLocaleString('cs-CZ'),
        approved: false,
        likes: 0
    });

    location.reload();
};

// like
window.likePost = (id, currentLikes) => {
    update(ref(db, 'gossip/' + id), {
        likes: (currentLikes || 0) + 1
    });
};

// approve
window.approvePost = (id) => {
    update(ref(db, 'gossip/' + id), { approved: true });
};

// delete
window.deletePost = (id) => {
    remove(ref(db, 'gossip/' + id));
};

// load
onValue(gossipRef, (snapshot) => {
    const feed = document.getElementById('gossipFeed');
    const data = snapshot.val();
    feed.innerHTML = "";

    if (!data) return;

    const items = Object.entries(data)
        .sort((a,b) => (b[1].likes || 0) - (a[1].likes || 0));

    items.forEach(([id, item]) => {

        if (!item.approved && !isAdmin) return;

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <div class="person">@${item.person || "unknown"}</div>
            <div>${item.text || ""}</div>
            ${item.image ? `<img src="${item.image}" class="gossip-img">` : ""}
            <div class="meta">${item.time}</div>

            <div class="actions">
                ❤️ ${item.likes || 0}
                <button class="like-btn" onclick="likePost('${id}', ${item.likes || 0})">Like</button>

                ${isAdmin && !item.approved ? `
                    <button class="admin-btn" onclick="approvePost('${id}')">✔️</button>
                    <button class="admin-btn" onclick="deletePost('${id}')">🗑️</button>
                ` : ""}
            </div>
        `;

        feed.appendChild(card);
    });
});
</script>

</body>
</html>
