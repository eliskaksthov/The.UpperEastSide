<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>THE LIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #080808; 
            --surface: #111111; 
            --accent: #ff2d55; 
            --text: #ffffff; 
            --muted: #555; 
            --border: #222; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg);
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
            color: var(--text); 
            min-height: 100vh; 
            transition: background 0.3s ease;
        }

        /* Navigace / Header */
        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
            background: rgba(8,8,8,0.85); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); 
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); }
        
        .nav-toggle { font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
        
        /* Hamburger Menu */
        .menu { 
            display: none; position: fixed; top: 60px; right: 20px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px; z-index: 1000; 
            flex-direction: column; gap: 5px; min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu.active { display: flex; }
        .menu button { 
            background: none; border: none; color: white; padding: 12px 15px; 
            text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; 
            font-size: 18px; border-radius: 8px; transition: 0.2s;
        }
        .menu button:hover { background: var(--border); color: var(--accent); }

        /* Hlavní obsah */
        .content { padding: 80px 20px 150px; max-width: 500px; margin: auto; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        /* Karty s drby */
        .card { 
            background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px); 
            border: 1px solid var(--border); border-radius: 15px; 
            padding: 15px; margin-bottom: 15px; 
        }
        .gossip-img { width: 100%; border-radius: 10px; margin: 10px 0; display: block; }
        .person { color: var(--accent); font-size: 14px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        
        /* Ranking */
        .rank-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--accent); 
        }

        /* Input Area (Spodní lišta) */
        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(0,0,0,0.9); border-top: 1px solid var(--border); 
            padding: 15px; z-index: 101; backdrop-filter: blur(10px);
        }
        .input-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 8px; }
        input { 
            background: var(--surface); border: 1px solid var(--border); 
            color: white; padding: 12px; border-radius: 10px; outline: none; 
        }
        .post-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 12px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; 
            cursor: pointer; font-size: 18px; letter-spacing: 1px;
        }

        /* Skrytí věcí pro adminy */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin #loginBtn { display: none !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">THE LIST</div>
    <button class="nav-toggle" onclick="toggleMenu()">☰</button>
</div>

<div class="menu" id="navMenu">
    <button onclick="showSection('feed')">📱 DRBY</button>
    <button onclick="showSection('ranking')">🏆 RANKING</button>
    <button id="loginBtn" onclick="showSection('login')">🔑 PŘIHLÁŠENÍ</button>
    <button class="admin-only" onclick="showSection('admin')">⚙️ ADMIN PANEL</button>
    <button class="admin-only" onclick="logout()" style="color: var(--accent);">🚪 ODHLÁSIT</button>
</div>

<div class="content">
    <div id="feed" class="section active">
        <div id="gossipFeed">Načítám...</div>
    </div>

    <div id="ranking" class="section">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:20px; font-size: 32px;">HALL OF SHAME</h2>
        <div id="rankingList"></div>
    </div>

    <div id="login" class="section">
        <div class="card">
            <h2 style="font-family:'Bebas Neue'; margin-bottom:15px;">VSTUP PRO ADMINY</h2>
            <input type="text" id="adminUser" placeholder="Uživatelské jméno" style="margin-bottom: 10px; width: 100%;">
            <input type="password" id="adminPass" placeholder="Heslo" style="margin-bottom: 15px; width: 100%; background: var(--surface); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px;">
            <button class="post-btn" onclick="handleLogin()" style="width: 100%;">PŘIHLÁSIT</button>
        </div>
    </div>

    <div id="admin" class="section admin-only">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px;">ADMIN PANEL</h2>
        <div class="card">
            <p style="margin-bottom: 10px;">Změnit dočasně pozadí (jen u tebe):</p>
            <input type="file" id="bgUpload" accept="image/*" onchange="uploadBackground()">
        </div>
        <div id="adminApproveList"></div>
    </div>
</div>

<div class="input-area" id="inputArea">
    <div class="input-container">
        <input type="text" id="personInput" placeholder="O kom to je?">
        <input type="text" id="gossipInput" placeholder="Co se stalo?">
        <div style="display: flex; gap: 10px;">
            <label style="background:var(--surface); padding:12px; border-radius:10px; cursor:pointer; flex:1; text-align:center; border:1px solid var(--border); font-size: 14px;">
                📷 FOTO <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="this.parentElement.innerText='✅ FOTO'">
            </label>
            <button class="post-btn" id="postBtn" style="flex:2">POSLAT</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// --- KONFIGURACE FIREBASE ---
const firebaseConfig = {
    apiKey: "SEM_VLOZ_SVOJE_API",
    authDomain: "the-list-1efde.firebaseapp.com",
    databaseURL: "https://the-list-1efde-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gossipRef = ref(db, 'gossip');

// --- ADMIN NASTAVENÍ ---
const ADMIN_USER = "admin"; 
const ADMIN_PASS = "1234"; // Tady si dejte vlastní heslo

window.handleLogin = () => {
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    if(u === ADMIN_USER && p === ADMIN_PASS) {
        localStorage.setItem('isAdmin', 'true');
        location.reload();
    } else { alert("Špatné jméno nebo heslo!"); }
};

window.logout = () => {
    localStorage.removeItem('isAdmin');
    location.reload();
};

const isAdmin = localStorage.getItem('isAdmin') === 'true';
if(isAdmin) document.body.classList.add('is-admin');

// --- POZADÍ ---
const globalDefaultBg = "https://i.ibb.co/1f6f5Hj2/image.png"; 

window.uploadBackground = function() {
    const file = document.getElementById('bgUpload').files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        localStorage.setItem('customBg', e.target.result);
        document.body.style.backgroundImage = `url(${e.target.result})`;
    };
    reader.readAsDataURL(file);
};

const savedBg = localStorage.getItem('customBg');
document.body.style.backgroundImage = `url(${savedBg || globalDefaultBg})`;

// --- NAVIGACE ---
window.toggleMenu = () => document.getElementById('navMenu').classList.toggle('active');

window.showSection = (id) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    document.getElementById('inputArea').style.display = (id === 'feed') ? 'block' : 'none';
};

// --- DATA ---
document.getElementById('postBtn').onclick = async () => {
    const text = document.getElementById('gossipInput').value;
    const person = document.getElementById('personInput').value.trim();
    const file = document.getElementById('fileInput').files[0];

    if(!text || !person) return alert("Vyplň jméno i drb!");

    let base64 = "";
    if (file) {
        base64 = await new Promise(res => {
            const reader = new FileReader();
            reader.onload = () => res(reader.result);
            reader.readAsDataURL(file);
        });
    }

    await push(gossipRef, {
        text, person, image: base64,
        time: new Date().toLocaleString('cs-CZ'),
        approved: false, likes: 0
    });
    alert("Drb byl odeslán ke schválení.");
    location.reload();
};

window.likePost = (id, cur) => update(ref(db, 'gossip/' + id), { likes: (cur || 0) + 1 });
window.approvePost = (id) => update(ref(db, 'gossip/' + id), { approved: true });
window.deletePost = (id) => confirm("Smazat tento drb?") && remove(ref(db, 'gossip/' + id));

// --- NAČÍTÁNÍ ---
onValue(gossipRef, (snapshot) => {
    const data = snapshot.val() || {};
    const feed = document.getElementById('gossipFeed');
    const rankingDiv = document.getElementById('rankingList');
    const adminDiv = document.getElementById('adminApproveList');
    
    feed.innerHTML = ""; 
    adminDiv.innerHTML = "<h3 style='margin:20px 0 10px; font-family:Bebas Neue; color:var(--accent)'>ČEKÁ NA SCHVÁLENÍ:</h3>";
    
    const rankData = {};

    Object.entries(data).reverse().forEach(([id, item]) => {
        const pName = item.person.toLowerCase();
        
        if(item.approved) {
            // Počítání do rankingu
            rankData[pName] = (rankData[pName] || 0) + (item.likes || 0);
            
            // Zobrazení ve feedu
            feed.innerHTML += `
                <div class="card">
                    <div class="person">@${item.person}</div>
                    <div style="line-height:1.5">${item.text}</div>
                    ${item.image ? `<img src="${item.image}" class="gossip-img">` : ""}
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                        <button class="post-btn" style="padding:5px 15px; font-size:14px;" onclick="likePost('${id}', ${item.likes})">❤️ ${item.likes || 0}</button>
                        ${isAdmin ? `<button onclick="deletePost('${id}')" style="background:none; border:none; color:#555; cursor:pointer;">🗑️</button>` : ""}
                    </div>
                </div>`;
        } else if(isAdmin) {
            // Zobrazení v adminu ke schválení
            adminDiv.innerHTML += `
                <div class="card" style="border-color: var(--accent)">
                    <b>@${item.person}</b>: ${item.text}
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        <button class="post-btn" style="flex:1; background:#28a745; font-size:14px" onclick="approvePost('${id}')">SCHVÁLIT</button>
                        <button class="post-btn" style="flex:1; background:#dc3545; font-size:14px" onclick="deletePost('${id}')">SMAZAT</button>
                    </div>
                </div>`;
        }
    });

    // Vykreslení rankingu
    const sorted = Object.entries(rankData).sort((a,b) => b[1] - a[1]);
    rankingDiv.innerHTML = sorted.length ? sorted.map(([name, likes], i) => `
        <div class="rank-item">
            <span style="font-weight:bold;">${i+1}. @${name}</span>
            <span style="color:var(--accent); font-weight:bold; font-size:18px;">${likes} ❤️</span>
        </div>
    `).join('') : "<p>Zatím tu nikdo není...</p>";
});
</script>
</body>
</html>
