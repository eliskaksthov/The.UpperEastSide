<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insider</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root { 
    --bg: #080808; 
    --surface: #111; 
    --accent: #ff2d55;
    --text: #fff; 
    --muted: #666; 
    --border: #222; 
}

* {
    box-sizing:border-box;
    margin:0;
    padding:0;
    touch-action: manipulation;
}

body {
    font-family:'DM Sans';
    background:var(--bg);
    color:var(--text);
}

.header {
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.content {
    padding:80px 15px;
    max-width:500px;
    margin:auto;
}

.section { display:none; }
.section.active { display:block; }

.card {
    background:#151515;
    padding:15px;
    border-radius:15px;
    margin-bottom:12px;
}

.person { color:var(--accent); }

.time { font-size:12px; color:var(--muted); }

img {
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

button {
    background:var(--accent);
    border:none;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    margin-top:8px;
}

.input-area {
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
}

input {
    width:100%;
    margin-bottom:6px;
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<div class="header">
    <b>Insider</b>
    <div>
        <button onclick="show('recent')">Feed</button>
        <button onclick="show('feed')">Gossips</button>
        <button onclick="show('ranking')">Ranking</button>
    </div>
</div>

<div class="content">

<!-- FEED = MAIN -->
<div id="recent" class="section active"></div>

<!-- ALL -->
<div id="feed" class="section"></div>

<!-- RANKING -->
<div id="ranking" class="section"></div>

</div>

<div class="input-area">
    <input id="person" placeholder="Who">
    <input id="text" placeholder="Gossip">
    <input type="file" id="file">
    <input id="adminPass" placeholder="Admin key (optional)">
    <button onclick="send()">SEND</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* 🔴 VLOŽ SVÉ FIREBASE /
const firebaseConfig = {
    apiKey: "SEM_API",
    authDomain: "xxx.firebaseapp.com",
    databaseURL: "https://xxx-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gossipRef = ref(db, "gossip");

/ ADMIN /
const ADMIN_KEY = "123456";
let isAdmin = localStorage.getItem("admin") === ADMIN_KEY;

/ NAV /
let current = "recent";
window.show = (s)=>{ current=s; render(); };

/ IMAGE COMPRESS /
function compress(file){
    return new Promise(res=>{
        const img=new Image();
        const url=URL.createObjectURL(file);
        img.onload=()=>{
            const canvas=document.createElement("canvas");
            let w=img.width,h=img.height;
            if(w>600){h=600/w;w=600;}
            canvas.width=w; canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            res(canvas.toDataURL("image/jpeg",0.6));
        };
        img.src=url;
    });
}

/* SEND /
window.send = async ()=>{
    const text=document.getElementById("text").value;
    const person=document.getElementById("person").value;
    const file=document.getElementById("file").files[0];
    const key=document.getElementById("adminPass").value;

    if(key===ADMIN_KEY){
        localStorage.setItem("admin",ADMIN_KEY);
        isAdmin=true;
    }

    let image="";
    if(file) image=await compress(file);

    await push(gossipRef,{
        text, person, image,
        time: Date.now(),
        approved: isAdmin,
        likes:0
    });

    document.getElementById("text").value="";
    document.getElementById("person").value="";
    document.getElementById("file").value="";
};

/ LIKE FIX (NO GLITCH) /
const cooldown=new Set();

window.like=(id,btn)=>{
    if(cooldown.has(id)) return;
    cooldown.add(id);

    runTransaction(ref(db,'gossip/'+id+'/likes'), c=>(c||0)+1)
    .then(r=>{
        btn.innerText="❤️ "+r.snapshot.val();
    })
    .finally(()=>{
        setTimeout(()=>cooldown.delete(id),800);
    });
};

/ APPROVE /
window.approve=id=>{
    update(ref(db,'gossip/'+id),{approved:true});
};

/ DATA /
let DATA={};

onValue(gossipRef,snap=>{
    DATA=snap.val()||{};
    render();
});

/ RENDER */
function render(){
    const feed=document.getElementById("feed");
    const recent=document.getElementById("recent");
    const ranking=document.getElementById("ranking");

    feed.innerHTML="";
    recent.innerHTML="";
    ranking.innerHTML="";

    const now=Date.now();
    const map={};

    Object.entries(DATA).reverse().forEach(([id,p])=>{

        if(!p.approved && !isAdmin) return;

        const el=document.createElement("div");
        el.className="card";

        el.innerHTML=             <div class="person">${p.person}</div>             <div class="time">${new Date(p.time).toLocaleString()}</div>             <div>${p.text}</div>             ${p.image?<img src="${p.image}">:""}             <button onclick="like('${id}',this)">❤️ ${p.likes||0}</button>             ${isAdmin && !p.approved ? <button onclick="approve('${id}')">Approve</button>: ""}        ;

        feed.appendChild(el.cloneNode(true));

        if(now - p.time < 86400000){
            recent.appendChild(el);
        }

        if(p.approved){
            map[p.person]=(map[p.person]||0)+(p.likes||0);
        }
    });

    Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([name,score],i)=>{
        ranking.innerHTML+=         <div class="card">             #${i+1} ${name} — ❤️ ${score}         </div>;
    });
}
</script>

</body>
</htm
