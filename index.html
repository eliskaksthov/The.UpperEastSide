<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>THE LIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080808; --surface: #111111; --accent: #ff2d55; --text: #ffffff; --muted: #555; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(8,8,8,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 15px 20px; text-align: center; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--accent); }
        
        .content { padding: 80px 20px 20px; max-width: 500px; margin: auto; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; animation: fadeIn 0.5s ease; }
        .gossip-img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
        
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid var(--border); padding: 15px; z-index: 101; }
        .input-container { max-width: 500px; margin: auto; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: var(--surface); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; outline: none; }
        .post-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; cursor: pointer; transition: 0.2s; }
        .post-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #preview { display: none; width: 40px; height: 40px; border-radius: 5px; object-fit: cover; border: 1px solid var(--accent); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header"><div class="logo">THE LIST</div></div>
<div class="content" id="gossipFeed">Načítám drby...</div>

<div class="input-area">
    <div class="input-container">
        <label style="cursor:pointer; font-size: 20px;" title="Přidat fotku">
            📷 <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="showPreview()">
        </label>
        <img id="preview">
        <input type="text" id="gossipInput" placeholder="Napiš anonymní drb...">
        <button class="post-btn" id="postBtn">POST</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // TVOJE KONFIGURACE (Zkontrolováno podle screenshotu)
    const firebaseConfig = {
        apiKey: "AIzaSyAc39Rt5BRBb7ijeYvcmOSx_AdyigvKNkk",
        authDomain: "the-list-1efde.firebaseapp.com",
        projectId: "the-list-1efde",
        storageBucket: "the-list-1efde.firebasestorage.app",
        messagingSenderId: "1093607046981",
        appId: "1:1093607046981:web:fd32032936e10f9c51082c",
        measurementId: "G-BT1B8DR2W7",
        databaseURL: "https://the-list-1efde-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gossipRef = ref(db, 'gossip');

    // Náhled vybrané fotky
    window.showPreview = function() {
        const file = document.getElementById('fileInput').files[0];
        const preview = document.getElementById('preview');
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    }

    // ODESÍLÁNÍ DAT
    document.getElementById('postBtn').onclick = async () => {
        const textInput = document.getElementById('gossipInput');
        const fileInput = document.getElementById('fileInput');
        const btn = document.getElementById('postBtn');
        
        if (!textInput.value.trim() && !fileInput.files[0]) return;
        
        btn.disabled = true;
        btn.innerText = "...";

        let base64Image = "";
        if (fileInput.files[0]) {
            const file = fileInput.files[0];
            // Převede obrázek na text, aby se dal uložit do databáze
            base64Image = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        try {
            await push(gossipRef, {
                text: textInput.value,
                image: base64Image,
                time: new Date().toLocaleString('cs-CZ')
            });
            
            // Resetování formuláře po úspěchu
            textInput.value = "";
            fileInput.value = "";
            document.getElementById('preview').style.display = 'none';
        } catch (e) {
            alert("Chyba při odesílání. Zkontroluj Rules ve Firebase!");
        } finally {
            btn.disabled = false;
            btn.innerText = "POST";
        }
    };

    // NAČÍTÁNÍ DAT V REÁLNÉM ČASE
    onValue(gossipRef, (snapshot) => {
        const feed = document.getElementById('gossipFeed');
        const data = snapshot.val();
        feed.innerHTML = "";
        
        if (data) {
            // Seřadíme drby od nejnovějšího
            const items = Object.values(data).reverse();
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-size:16px; line-height:1.4;">${item.text || ""}</div>
                    ${item.image ? `<img src="${item.image}" class="gossip-img">` : ""}
                    <div style="color:var(--muted); font-size:10px; margin-top:10px; letter-spacing:1px;">${item.time}</div>
                `;
                feed.appendChild(card);
            });
        } else {
            feed.innerHTML = "<div style='text-align:center; color:var(--muted); margin-top:50px;'>Zatím žádné drby. Buď první! 👀</div>";
        }
    });
</script>

</body>
</html>
