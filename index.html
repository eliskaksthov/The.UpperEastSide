<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insider</title>

<style>
:root {
  --bg:#080808;
  --card:#151515;
  --accent:#ff2d55;
  --text:#fff;
  --muted:#777;
}

* {
  box-sizing:border-box;
  margin:0;
  padding:0;
  touch-action: manipulation;
}

body {
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header {
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.content {
  padding:80px 15px;
  max-width:500px;
  margin:auto;
}

.card {
  background:var(--card);
  padding:15px;
  border-radius:15px;
  margin-bottom:12px;
}

.person {
  color:var(--accent);
  font-weight:bold;
}

.time {
  font-size:12px;
  color:var(--muted);
}

img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

button {
  background:var(--accent);
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  margin-top:8px;
}

.nav button {
  background:none;
}

.input-area {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
}

input {
  width:100%;
  margin-bottom:6px;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <b>Insider</b>
  <div class="nav">
    <button onclick="show('feed')">Feed</button>
    <button onclick="show('ranking')">Ranking</button>
  </div>
</div>

<div class="content" id="content"></div>

<div class="input-area">
  <input id="person" placeholder="Who">
  <input id="text" placeholder="Gossip">
  <input type="file" id="file">
  <input id="adminPass" placeholder="Admin key (optional)">
  <button onclick="send()">SEND</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔴 VLOŽ SVÉ FIREBASE ÚDAJE
const firebaseConfig = {
  apiKey: "SEM_API_KEY",
  authDomain: "xxx.firebaseapp.com",
  databaseURL: "https://xxx-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gossipRef = ref(db, "gossip");

// 🔐 ADMIN
const ADMIN_KEY = "123456";
let isAdmin = false;

// pokud zadáš key → uloží se
const saved = localStorage.getItem("admin");
if(saved === ADMIN_KEY) isAdmin = true;

// NAV
let current = "feed";
window.show = (s)=>{
  current = s;
  render();
};

// SEND
window.send = async ()=>{
  const text = document.getElementById("text").value;
  const person = document.getElementById("person").value;
  const file = document.getElementById("file").files[0];
  const key = document.getElementById("adminPass").value;

  if(key === ADMIN_KEY){
    localStorage.setItem("admin", ADMIN_KEY);
    isAdmin = true;
  }

  let image = "";

  if(file){
    image = await compress(file);
  }

  await push(gossipRef,{
    text,
    person,
    image,
    time: Date.now(),
    approved: isAdmin,
    likes:0
  });

  render();
};

// IMAGE COMPRESS
function compress(file){
  return new Promise(res=>{
    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = ()=>{
      const canvas = document.createElement("canvas");
      let w = img.width;
      let h = img.height;

      if(w>600){
        h = h * (600/w);
        w = 600;
      }

      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);

      res(canvas.toDataURL("image/jpeg",0.6));
    };

    img.src = url;
  });
}

// LIKE
const cooldown = new Set();

window.like = (id,btn)=>{
  if(cooldown.has(id)) return;

  cooldown.add(id);

  runTransaction(ref(db,'gossip/'+id+'/likes'), (c)=> (c||0)+1)
  .then(r=>{
    btn.innerText = "❤️ "+r.snapshot.val();
  })
  .finally(()=>{
    setTimeout(()=>cooldown.delete(id),800);
  });
};

// APPROVE
window.approve = (id)=>{
  update(ref(db,'gossip/'+id),{approved:true});
};

// DATA
let DATA = {};

onValue(gossipRef,(snap)=>{
  DATA = snap.val() || {};
  render();
});

// RENDER
function render(){
  const el = document.getElementById("content");
  el.innerHTML = "";

  if(current==="feed"){
    Object.entries(DATA).reverse().forEach(([id,p])=>{
      if(!p.approved && !isAdmin) return;

      el.innerHTML +=       <div class="card">         <div class="person">${p.person}</div>         <div class="time">${new Date(p.time).toLocaleString()}</div>         <div>${p.text}</div>         ${p.image ?<img src="${p.image}">: ""}         <button onclick="like('${id}',this)">❤️ ${p.likes||0}</button>         ${isAdmin && !p.approved ?<button onclick="approve('${id}')">Approve</button>: ""}       </div>      ;
    });
  }

  if(current==="ranking"){
    const map = {};

    Object.values(DATA).forEach(p=>{
      if(!p.approved) return;
      if(!map[p.person]) map[p.person]=0;
      map[p.person]+=p.likes||0;
    });

    const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);

    sorted.forEach(([name,score],i)=>{
      el.innerHTML +=       <div class="card">         #${i+1} ${name} — ❤️ ${score}       </div>      ;
    });
  }
}
</script>

</body>
</htm
