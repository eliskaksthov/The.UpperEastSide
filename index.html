<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Insider</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #080808; --surface: #111111; --accent: #ff2d55;
            --accent-good: #30d158; --text: #ffffff; --muted: #555; --border: #222; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); 
            min-height: 100vh; background-image: url('https://i.imgur.com/BBWTLg6.jpeg');
            background-attachment: fixed; background-size: cover;
        }
        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
            background: rgba(8,8,8,0.75); backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--border); padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-size: 28px; color: var(--accent); font-weight: bold; }
        .nav-toggle { font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
        .menu { 
            display: none; position: fixed; top: 60px; right: 20px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px; z-index: 1000; 
            flex-direction: column; gap: 5px; min-width: 180px;
        }
        .menu.active { display: flex; }
        .menu button { 
            background: none; border: none; color: white; padding: 12px 15px; 
            text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; 
            font-size: 18px; border-radius: 8px;
        }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        .content { padding: 80px 20px 60px; max-width: 500px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { 
            background: rgba(17, 17, 17, 0.85); backdrop-filter: blur(6px);
            border: 1px solid var(--border); border-radius: 15px; 
            padding: 15px; margin-bottom: 15px;
        }
        .gossip-img { width: 100%; border-radius: 10px; margin: 10px 0; }
        .person { color: var(--accent); font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .post-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 12px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; 
            cursor: pointer; font-size: 18px; width: 100%;
        }
        .input-toggle-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px; border-radius: 50%; background: var(--accent);
            color: white; font-size: 24px; border: none; z-index: 200; display: none;
        }
    </style>
</head>
<body class="">

<div class="header">
    <div class="logo">Insider</div>
    <button class="nav-toggle" onclick="toggleMenu()">&#9776;</button>
</div>

<div class="menu" id="navMenu">
    <button onclick="showSection('feed')">GOSSIPS</button>
    <button onclick="showSection('recent')">FEED 24H</button>
    <button onclick="showSection('ranking')">RANKING</button>
    <button id="loginBtn" onclick="showSection('login')">LOGIN</button>
    <button class="admin-only" onclick="showSection('admin')">ADMIN</button>
    <button class="admin-only" onclick="logout()" style="color: var(--accent);">LOG OUT</button>
</div>

<div class="content">
    <div id="feed" class="section">
        <div id="gossipFeed"></div>
    </div>
    <div id="recent" class="section active">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px;">Last 24 Hours</h2>
        <div id="recentFeed"></div>
    </div>
    <div id="ranking" class="section">
        <div id="rankingList"></div>
    </div>
    <div id="login" class="section">
        <div class="card">
            <input type="password" id="adminPass" placeholder="Heslo" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="post-btn" onclick="handleLogin()">VSTOUPIT</button>
        </div>
    </div>
    <div id="admin" class="section admin-only">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px;">KE SCHVÁLENÍ</h2>
        <div id="adminApproveList"></div>
    </div>
</div>

<button class="input-toggle-btn" id="inputToggle" onclick="alert('Použij GOSSIPS sekci pro přidání')">+</button>

<script>
const SUPABASE_URL = 'https://rfpsagdsxqstbvtdcsmy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QAlABDjRq-eDetfcgWC6xA_vQz21wrG';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const isAdmin = localStorage.getItem('isInsiderAdmin') === 'true';
if (isAdmin) document.body.classList.add('is-admin');

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    document.getElementById('inputToggle').style.display = (id === 'feed') ? 'block' : 'none';
}

function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

function handleLogin() {
    if (document.getElementById('adminPass').value === "1234") {
        localStorage.setItem('isInsiderAdmin', 'true');
        location.reload();
    }
}
function logout() { localStorage.removeItem('isInsiderAdmin'); location.reload(); }

async function loadData() {
    const { data: gossips } = await _supabase.from('gossips').select('*').order('created_at', { ascending: false });
    
    const feed = document.getElementById('gossipFeed');
    const recent = document.getElementById('recentFeed');
    const adminList = document.getElementById('adminApproveList');

    feed.innerHTML = ''; recent.innerHTML = ''; adminList.innerHTML = '';

    gossips.forEach(item => {
        // Tady je ta hlavní změna:
        if (item.approved) {
            // SCHVÁLENÉ - jdou do normálního feedu
            const html = `<div class="card"><div class="person">${item.person}</div><div>${item.content}</div></div>`;
            feed.innerHTML += html;
            recent.innerHTML += html;
        } else if (isAdmin) {
            // NESCHVÁLENÉ - jdou POUZE do admin sekce
            adminList.innerHTML += `
                <div class="card" style="border: 1px solid orange;">
                    <b>${item.person}</b>: ${item.content}
                    <button class="post-btn" style="background:green; margin-top:10px;" onclick="approvePost('${item.id}')">SCHVÁLIT</button>
                </div>`;
        }
    });
}

async function approvePost(id) {
    await _supabase.from('gossips').update({ approved: true }).eq('id', id);
    loadData();
}

loadData();
setInterval(loadData, 10000);
</script>
</body>
</html>
