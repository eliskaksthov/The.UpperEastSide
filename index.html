<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Insider</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #080808; 
            --surface: #111111; 
            --accent: #ff2d55;
            --accent-good: #30d158;
            --text: #ffffff; 
            --muted: #555; 
            --border: #222; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg);
            color: var(--text); 
            min-height: 100vh;
            background-image: url('https://i.imgur.com/BBWTLg6.jpeg');
            background-attachment: fixed;
            background-size: cover;
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
            background: rgba(8,8,8,0.75);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); 
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
        }

        .logo { font-size: 28px; color: var(--accent); font-weight: bold; }
        .nav-toggle { font-size: 28px; cursor: pointer; color: white; background: none; border: none; }
        
        .menu { 
            display: none; position: fixed; top: 60px; right: 20px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px; z-index: 1000; 
            flex-direction: column; gap: 5px; min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu.active { display: flex; }
        .menu button { 
            background: none; border: none; color: white; padding: 12px 15px; 
            text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; 
            font-size: 18px; border-radius: 8px; transition: 0.2s;
        }
        .menu button:hover { background: var(--border); color: var(--accent); }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin #loginBtn { display: none !important; }

        .content { padding: 80px 20px 60px; max-width: 500px; margin: auto; }

        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        .card { 
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border); border-radius: 15px; 
            padding: 15px; margin-bottom: 15px; position: relative;
        }

        .gossip-img { width: 100%; border-radius: 10px; margin: 10px 0; display: block; }
        .person { color: var(--accent); font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .post-time { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

        .like-btn {
            background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: 0.2s;
            font-family: 'Bebas Neue', sans-serif; font-size: 14px;
        }
        .like-btn.liked { background: var(--accent); border-color: var(--accent); }

        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(8,8,8,0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); padding: 15px;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.4,0,0.2,1); z-index: 101;
        }
        .input-area.open { transform: translateY(0); }

        .input-toggle-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px; border-radius: 50%; background: var(--accent);
            border: none; color: white; font-size: 24px; cursor: pointer; z-index: 200;
            display: none;
        }

        input[type="text"] { 
            width: 100%; background: #222; border: 1px solid #333; color: white;
            padding: 12px; border-radius: 10px; margin-bottom: 8px; outline: none;
        }

        .post-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 12px; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; 
            cursor: pointer; font-size: 18px; width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Insider</div>
    <button class="nav-toggle" onclick="toggleMenu()">&#9776;</button>
</div>

<div class="menu" id="navMenu">
    <button onclick="showSection('feed')">GOSSIPS</button>
    <button onclick="showSection('recent')">FEED 24H</button>
    <button onclick="showSection('ranking')">RANKING</button>
    <button id="loginBtn" onclick="showSection('login')">LOGIN</button>
    <button class="admin-only" onclick="showSection('admin')">ADMIN</button>
    <button class="admin-only" onclick="logout()" style="color: var(--accent);">LOG OUT</button>
</div>

<div class="content">
    <div id="feed" class="section">
        <div id="gossipFeed">Načítám drby...</div>
    </div>

    <div id="recent" class="section active">
        <h2 style="font-family:'Bebas Neue'; margin-bottom: 15px;">Last 24 Hours</h2>
        <div id="recentFeed"></div>
    </div>

    <div id="ranking" class="section">
        <h2 style="font-family:'Bebas Neue'; margin-bottom: 15px;">Ranking</h2>
        <div id="rankingList"></div>
    </div>

    <div id="login" class="section">
        <div class="card">
            <h2 style="font-family:'Bebas Neue'">Admin Access</h2>
            <input type="password" id="adminPass" placeholder="Heslo" style="width:100%; margin: 10px 0; padding:10px;">
            <button class="post-btn" onclick="handleLogin()">Vstoupit</button>
        </div>
    </div>

    <div id="admin" class="section admin-only">
        <div id="adminApproveList"></div>
    </div>
</div>

<button class="input-toggle-btn" id="inputToggle" onclick="toggleInputArea()">+</button>

<div class="input-area" id="inputArea">
    <input type="text" id="personInput" placeholder="O kom?">
    <input type="text" id="gossipInput" placeholder="Co se stalo?">
    <input type="file" id="fileInput" accept="image/*" style="margin-bottom:10px;">
    <button class="post-btn" onclick="submitGossip()">ODESLAT</button>
</div>

<script>
const SUPABASE_URL = 'https://rfpsagdsxqstbvtdcsmy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QAlABDjRq-eDetfcgWC6xA_vQz21wrG';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASS = "1234";
const RANKED_PEOPLE = ["Lily", "Mason", "Alison", "Katie", "James"];

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    
    const plusBtn = document.getElementById('inputToggle');
    plusBtn.style.display = (id === 'feed') ? 'block' : 'none';
}

function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

function toggleInputArea() {
    const area = document.getElementById('inputArea');
    area.classList.toggle('open');
    document.getElementById('inputToggle').innerText = area.classList.contains('open') ? '×' : '+';
}

const isAdmin = localStorage.getItem('isInsiderAdmin') === 'true';
if (isAdmin) document.body.classList.add('is-admin');

function handleLogin() {
    if (document.getElementById('adminPass').value === ADMIN_PASS) {
        localStorage.setItem('isInsiderAdmin', 'true');
        location.reload();
    } else { alert("Chybné heslo"); }
}
function logout() { localStorage.removeItem('isInsiderAdmin'); location.reload(); }

async function submitGossip() {
    const person = document.getElementById('personInput').value.trim();
    const content = document.getElementById('gossipInput').value.trim();
    const file = document.getElementById('fileInput').files[0];
    if (!person || !content) return alert("Vyplň vše!");

    let imageUrl = null;
    if (file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Math.random()}.${fileExt}`;
        const { data } = await _supabase.storage.from('gossip-images').upload(fileName, file);
        if (data) imageUrl = `${SUPABASE_URL}/storage/v1/object/public/gossip-images/${fileName}`;
    }

    const { error } = await _supabase.from('gossips').insert([{ person, content, image_url: imageUrl }]);
    if (!error) { alert("Odesláno!"); location.reload(); }
}

async function loadData() {
    const { data: gossips, error } = await _supabase.from('gossips').select('*').order('created_at', { ascending: false });
    if (error) return;

    const feed = document.getElementById('gossipFeed');
    const recent = document.getElementById('recentFeed');
    const adminList = document.getElementById('adminApproveList');
    const rankingList = document.getElementById('rankingList');

    feed.innerHTML = ''; recent.innerHTML = ''; adminList.innerHTML = '';
    
    // Nápis vložíme jen do admin sekce
    if (isAdmin) {
        adminList.innerHTML = '<h2 style="font-family:\'Bebas Neue\'; margin-bottom: 15px;">KE SCHVÁLENÍ</h2>';
    }

    const stats = {};
    RANKED_PEOPLE.forEach(p => stats[p.toLowerCase()] = 0);
    const now = new Date();

    gossips.forEach(item => {
        if (item.approved) {
            const cardHtml = `
                <div class="card">
                    <div class="person">${item.person}</div>
                    <div class="post-time">${new Date(item.created_at).toLocaleString('cs-CZ')}</div>
                    <div style="margin: 10px 0;">${item.content}</div>
                    ${item.image_url ? `<img src="${item.image_url}" class="gossip-img">` : ''}
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button class="like-btn ${localStorage.getItem('liked_'+item.id) ? 'liked' : ''}" onclick="likePost('${item.id}', ${item.likes})">${item.likes} LIKES</button>
                        ${isAdmin ? `<button onclick="deletePost('${item.id}')" style="color:red; background:none; border:none; font-family:'Bebas Neue'">Smazat</button>` : ''}
                    </div>
                </div>`;
            feed.innerHTML += cardHtml;
            const pLower = item.person.toLowerCase();
            RANKED_PEOPLE.forEach(name => { if (pLower.includes(name.toLowerCase())) stats[name.toLowerCase()]++; });
            if ((now - new Date(item.created_at)) < 24 * 60 * 60 * 1000) recent.innerHTML += cardHtml;
        } else if (isAdmin) {
            // Oranžové karty jen do admin sekce
            adminList.innerHTML += `
                <div class="card" style="border: 2px solid orange">
                    <div style="margin: 10px 0;"><b>${item.person}:</b> ${item.content}</div>
                    ${item.image_url ? `<img src="${item.image_url}" class="gossip-img" style="opacity:0.5">` : ''}
                    <button class="post-btn" style="background:green; margin-bottom:5px;" onclick="approvePost('${item.id}')">SCHVÁLIT</button>
                    <button class="post-btn" style="background:red" onclick="deletePost('${item.id}')">ZAMÍTNOUT</button>
                </div>`;
        }
    });

    const sorted = RANKED_PEOPLE.sort((a,b) => stats[b.toLowerCase()] - stats[a.toLowerCase()]);
    rankingList.innerHTML = sorted.map((name, i) => `
        <div class="card" style="display:flex; justify-content:space-between">
            <span>${i+1}. ${name}</span>
            <span style="color:var(--accent)">${stats[name.toLowerCase()]}×</span>
        </div>`).join('');
}

async function likePost(id, currentLikes) {
    if (localStorage.getItem('liked_' + id)) return;
    localStorage.setItem('liked_' + id, 'true');
    await _supabase.from('gossips').update({ likes: currentLikes + 1 }).eq('id', id);
    loadData();
}

async function approvePost(id) {
    await _supabase.from('gossips').update({ approved: true }).eq('id', id);
    loadData();
}

async function deletePost(id) {
    if (confirm("Opravdu smazat?")) { await _supabase.from('gossips').delete().eq('id', id); loadData(); }
}

loadData();
setInterval(loadData, 30000);
showSection('recent');
</script>
</body>
</html>
