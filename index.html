<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Insider</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #080808; 
            --surface: #111111; 
            --accent: #ff2d55;
            --accent-good: #30d158;
            --text: #ffffff; 
            --muted: #555; 
            --border: #222; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg);
            color: var(--text); 
            min-height: 100vh;
            background-image: url('https://i.imgur.com/BBWTLg6.jpeg');
            background-attachment: fixed;
            background-size: cover;
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
            background: rgba(8,8,8,0.75);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); 
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
        }

        .header-right { display: flex; align-items: center; gap: 15px; }

        .logo { font-size: 28px; color: var(--accent); font-weight: bold; }
        .nav-toggle, .search-toggle { font-size: 24px; cursor: pointer; color: white; background: none; border: none; outline: none; }
        
        .search-bar {
            position: fixed; top: 60px; left: 0; right: 0;
            background: rgba(17, 17, 17, 0.95);
            padding: 10px 20px; border-bottom: 1px solid var(--border);
            display: none; z-index: 99; transform: translateY(-10px); transition: 0.3s;
        }
        .search-bar.active { display: block; transform: translateY(0); }
        
        .search-container {
            display: flex; gap: 10px; align-items: center; max-width: 1200px; margin: auto;
        }

        .input-wrapper { position: relative; flex: 1; }

        .search-input {
            width: 100%; padding: 12px 40px 12px 15px; background: #222; border: 1px solid var(--border);
            border-radius: 25px; color: white; font-family: 'DM Sans', sans-serif; outline: none;
        }

        .clear-search {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px;
        }

        .search-confirm-btn {
            background: var(--accent); color: white; border: none; padding: 10px 20px;
            border-radius: 20px; font-family: 'Bebas Neue'; cursor: pointer; font-size: 16px;
        }

        .menu { 
            display: none; position: fixed; top: 60px; right: 20px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px; z-index: 1000; 
            flex-direction: column; gap: 5px; min-width: 180px;
        }
        .menu.active { display: flex; }
        .menu button { 
            background: none; border: none; color: white; padding: 12px 15px; 
            text-align: left; cursor: pointer; font-family: 'Bebas Neue', sans-serif; 
            font-size: 18px; border-radius: 8px;
        }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .guest-only { display: none !important; }

        .content { padding: 80px 20px 60px; width: 100%; max-width: 500px; margin: auto; transition: max-width 0.3s; }

        .section { display: none; }
        .section.active { display: block; }

        .card { 
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border); border-radius: 15px; 
            padding: 15px; margin-bottom: 15px;
            width: 100%;
        }

        .hero-card {
            width: 100%;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .gossip-img { 
            width: 100%; border-radius: 10px; margin: 10px 0; display: block; 
            cursor: pointer; transition: opacity 0.2s;
            object-fit: contain;
        }
        .gossip-img:hover { opacity: 0.9; }

        @media (min-width: 1024px) {
            .content { max-width: 1200px; }
            .hero-card .gossip-img { max-height: 70vh; }
        }

        .person { color: var(--accent); font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .post-time { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

        .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        
        .like-btn, .comm-btn {
            background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 20px; cursor: pointer;
            font-family: 'Bebas Neue', sans-serif; font-size: 14px;
        }
        .like-btn.liked { background: var(--accent); }

        .comments-box { 
            margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
            display: none; 
        }
        .comment {
            background: rgba(255,255,255,0.03); border-radius: 8px;
            padding: 10px; margin-bottom: 8px; font-size: 13px; position: relative;
        }
        .comm-input-wrap { display: flex; gap: 5px; margin-top: 10px; }
        .comm-input { 
            flex: 1; background: #222; border: 1px solid #333; color: white;
            padding: 8px; border-radius: 5px; font-size: 13px; outline: none;
        }

        .lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 5px; }
        .lightbox-close {
            position: absolute; top: 20px; right: 20px; color: white; font-size: 40px;
            cursor: pointer; font-family: 'Bebas Neue'; line-height: 1;
        }

        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(8,8,8,0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); padding: 15px;
            transform: translateY(100%); transition: 0.4s; z-index: 101;
        }
        .input-area.open { transform: translateY(0); }

        .input-toggle-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px; border-radius: 50%; background: var(--accent);
            border: none; color: white; font-size: 24px; cursor: pointer; z-index: 200;
        }

        .post-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-family: 'Bebas Neue'; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Insider</div>
    <div class="header-right">
        <button class="search-toggle" onclick="toggleSearch()">🔍</button>
        <button class="nav-toggle" onclick="toggleMenu()">&#9776;</button>
    </div>
</div>

<div class="search-bar" id="searchBar">
    <div class="search-container">
        <div class="input-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="Search for a person or text..." onkeypress="if(event.key === 'Enter') confirmSearch()">
            <button class="clear-search" onclick="clearSearch()">✕</button>
        </div>
        <button class="search-confirm-btn" onclick="confirmSearch()">SEARCH</button>
    </div>
</div>

<div class="menu" id="navMenu">
    <button onclick="showSection('recent')">FEED</button>
    <button onclick="showSection('feed')">GOSSIPS</button>
    <button onclick="showSection('ranking')">RANKING</button>
    <button id="loginBtn" class="guest-only" onclick="showSection('login')">LOG IN</button>
    <button class="admin-only" onclick="showSection('admin')">ADMIN</button>
    <button class="admin-only" onclick="logout()" style="color: var(--accent);">LOG OUT</button>
</div>

<div class="lightbox" id="imageLightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="">
</div>

<div class="content">
    <div id="feed" class="section"></div>
    <div id="recent" class="section active">
        <h2 style="font-family:'Bebas Neue'; margin-bottom: 15px; text-align: center;">Breaking News</h2>
        <div id="recentContent"></div>
    </div>
    <div id="ranking" class="section">
        <h2 style="font-family:'Bebas Neue'; margin-bottom: 15px;">Ranking</h2>
        <div id="rankingList"></div>
    </div>
    <div id="login" class="section">
        <div class="card">
            <h2 style="font-family:'Bebas Neue'">Admin</h2>
            <input type="password" id="adminPass" placeholder="Heslo" style="width:100%; margin: 10px 0; padding:10px; background:#222; color:white; border:none; border-radius:8px;">
            <button class="post-btn" onclick="handleLogin()">Enter</button>
        </div>
    </div>
    <div id="admin" class="section">
        <h2 style="font-family:'Bebas Neue'; margin-bottom: 15px;">For approval</h2>
        <div id="adminContent"></div>
    </div>
</div>

<button class="input-toggle-btn" id="inputToggle" onclick="toggleInputArea()" style="display:none;">+</button>

<div class="input-area" id="inputArea">
    <input type="text" id="personInput" placeholder="Who was that about?" style="width:100%; margin-bottom:5px; padding:10px; background:#222; color:white; border:none; border-radius:8px;">
    <input type="text" id="gossipInput" placeholder="What happened?" style="width:100%; margin-bottom:5px; padding:10px; background:#222; color:white; border:none; border-radius:8px;">
    <input type="file" id="fileInput" accept="image/*" style="margin-bottom:10px;">
    <button class="post-btn" onclick="submitGossip()">SEND</button>
</div>

<script>
const SUPABASE_URL = 'https://rfpsagdsxqstbvtdcsmy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QAlABDjRq-eDetfcgWC6xA_vQz21wrG';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASS = "1234";
const RANKED_PEOPLE = ["Lily", "Mason", "Alison", "Katie", "James"];
const isAdmin = localStorage.getItem('isInsiderAdmin') === 'true';
if (isAdmin) document.body.classList.add('is-admin');

let allGossips = []; 
let currentFilter = '';

function toggleSearch() {
    const bar = document.getElementById('searchBar');
    bar.classList.toggle('active');
    if (bar.classList.contains('active')) {
        document.getElementById('searchInput').focus();
    }
}

function confirmSearch() {
    currentFilter = document.getElementById('searchInput').value.toLowerCase().trim();
    renderGossips(allGossips, currentFilter);
    toggleSearch(); 
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    currentFilter = '';
    renderGossips(allGossips, '');
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('navMenu').classList.remove('active');
    document.getElementById('inputToggle').style.display = (id === 'feed') ? 'block' : 'none';
    loadData();
}

function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
function toggleInputArea() {
    const area = document.getElementById('inputArea');
    area.classList.toggle('open');
    document.getElementById('inputToggle').innerText = area.classList.contains('open') ? '×' : '+';
}

function openLightbox(src) {
    const lb = document.getElementById('imageLightbox');
    const img = document.getElementById('lightboxImg');
    img.src = src;
    lb.classList.add('active');
}
function closeLightbox() {
    document.getElementById('imageLightbox').classList.remove('active');
}

async function loadData() {
    const { data: gossips } = await _supabase.from('gossips').select('*, gossip_comments(count)').order('created_at', { ascending: false });
    allGossips = gossips || [];
    renderGossips(allGossips, currentFilter);
}

function renderGossips(gossips, filter = '') {
    const feed = document.getElementById('feed');
    const recent = document.getElementById('recentContent');
    const adminList = document.getElementById('adminContent');
    const rankingList = document.getElementById('rankingList');
    
    feed.innerHTML = ''; recent.innerHTML = ''; adminList.innerHTML = '';
    const stats = {};
    RANKED_PEOPLE.forEach(p => stats[p.toLowerCase()] = 0);

    const filteredApproved = gossips.filter(item => {
        if (!item.approved) return false;
        if (!filter) return true;
        return item.person.toLowerCase().includes(filter) || item.content.toLowerCase().includes(filter);
    });

    gossips.forEach(item => {
        const commentCount = item.gossip_comments?.[0]?.count || 0;
        
        const createCard = (prefix, allowWriting, isHero = false) => `
            <div class="card ${isHero ? 'hero-card' : ''}">
                <div class="person">${item.person}</div>
                <div class="post-time">${new Date(item.created_at).toLocaleString('cs-CZ')}</div>
                <div style="font-size: ${isHero ? '20px' : '16px'}; margin-bottom:10px;">${item.content}</div>
                ${item.image_url ? `<img src="${item.image_url}" class="gossip-img" onclick="openLightbox('${item.image_url}')">` : ''}
                <div class="btn-row">
                    <button class="like-btn ${localStorage.getItem('liked_'+item.id) ? 'liked' : ''}" onclick="likePost('${item.id}', ${item.likes})">${item.likes} LIKES</button>
                    <button class="comm-btn" onclick="toggleComments('${prefix}', '${item.id}', ${allowWriting})">${commentCount} COMMENTS</button>
                    ${isAdmin ? `<button onclick="deletePost('${item.id}', true)" style="color:var(--accent); background:none; border:none; font-family:'Bebas Neue'; cursor:pointer;">DELETE</button>` : ''}
                </div>
                <div class="comments-box" id="${prefix}-box-${item.id}">
                    <div id="${prefix}-list-${item.id}"></div>
                    ${allowWriting ? `
                        <div class="comm-input-wrap">
                            <input type="text" class="comm-input" id="${prefix}-input-${item.id}" placeholder="Write a comment.">
                            <button class="comm-btn" style="background:var(--accent)" onclick="sendComment('${prefix}', '${item.id}')">-></button>
                        </div>
                    ` : '<div style="font-size:11px; color:var(--muted); margin-top:10px; text-align:center;">Comments can only be made in the GOSSIPS</div>'}
                </div>
            </div>
        `;

        if (item.approved) {
            if (filteredApproved.includes(item)) {
                feed.innerHTML += createCard('gossip', true);
            }
            const pLower = item.person.toLowerCase();
            RANKED_PEOPLE.forEach(name => {
                if (pLower.includes(name.toLowerCase())) stats[name.toLowerCase()]++;
            });
        } else if (isAdmin) {
            adminList.innerHTML += `
                <div class="card" style="border: 1px solid orange">
                    <div class="person">${item.person}</div>
                    <div style="margin-bottom:10px;">${item.content}</div>
                    ${item.image_url ? `<img src="${item.image_url}" class="gossip-img" onclick="openLightbox('${item.image_url}')">` : ''}
                    <div class="btn-row">
                        <button class="post-btn" style="background:var(--accent-good); width:auto;" onclick="approvePost('${item.id}')">APPROVE</button>
                        <button class="post-btn" style="width:auto;" onclick="deletePost('${item.id}', false)">DELETE</button>
                    </div>
                </div>
            `;
        }
    });

    const heroPost = filteredApproved[0];
    if (heroPost) {
        const item = heroPost;
        const commentCount = item.gossip_comments?.[0]?.count || 0;
        recent.innerHTML = `
            <div class="card hero-card">
                <div class="person" style="font-size: 18px;">${item.person}</div>
                <div class="post-time">${new Date(item.created_at).toLocaleString('cs-CZ')}</div>
                <div style="font-size: 22px; margin: 15px 0; line-height: 1.4;">${item.content}</div>
                ${item.image_url ? `<img src="${item.image_url}" class="gossip-img" onclick="openLightbox('${item.image_url}')">` : ''}
                <div class="btn-row">
                    <button class="like-btn ${localStorage.getItem('liked_'+item.id) ? 'liked' : ''}" onclick="likePost('${item.id}', ${item.likes})">${item.likes} LIKES</button>
                    <button class="comm-btn" onclick="toggleComments('recent', '${item.id}', false)">${commentCount} COMMENTS</button>
                </div>
                <div class="comments-box" id="recent-box-${item.id}">
                    <div id="recent-list-${item.id}"></div>
                    <div style="font-size:11px; color:var(--muted); margin-top:10px; text-align:center;">Comments can only be made in the GOSSIPS</div>
                </div>
            </div>
        `;
    } else if (filter) {
        recent.innerHTML = '<p style="text-align:center; color:var(--muted); margin-top:20px;">No results found for: "' + filter + '"</p>';
    }

    const sorted = [...RANKED_PEOPLE].sort((a,b) => stats[b.toLowerCase()] - stats[a.toLowerCase()]);
    rankingList.innerHTML = sorted.map((name, i) => `
        <div class="card" style="display:flex; justify-content:space-between">
            <span>${i+1}. ${name}</span>
            <span style="color:var(--accent)">${stats[name.toLowerCase()]}×</span>
        </div>
    `).join('');
}

async function toggleComments(prefix, id, allowWriting) {
    const box = document.getElementById(`${prefix}-box-${id}`);
    if (box.style.display === 'block') {
        box.style.display = 'none';
    } else {
        box.style.display = 'block';
        const { data: comms } = await _supabase.from('gossip_comments').select('*').eq('gossip_id', id).order('created_at', { ascending: true });
        const list = document.getElementById(`${prefix}-list-${id}`);
        list.innerHTML = comms.length ? comms.map(c => `
            <div class="comment">
                <div style="font-size:10px; color:var(--muted)">${new Date(c.created_at).toLocaleTimeString('cs-CZ')}</div>
                ${c.content}
                ${isAdmin ? `<span style="color:red; cursor:pointer; position:absolute; right:10px; top:10px;" onclick="deleteComment('${c.id}')">×</span>` : ''}
            </div>
        `).join('') : '<div style="font-size:12px; color:var(--muted); text-align:center; padding:10px;">No comments yet.</div>';
    }
}

async function sendComment(prefix, gossipId) {
    const input = document.getElementById(`${prefix}-input-${gossipId}`);
    const content = input.value.trim();
    if (!content) return;
    await _supabase.from('gossip_comments').insert([{ gossip_id: gossipId, content }]);
    input.value = '';
    loadData(); 
}

async function deleteComment(cId) {
    // Odstraněno confirm
    await _supabase.from('gossip_comments').delete().eq('id', cId);
    loadData();
}

async function likePost(id, currentLikes) {
    if (localStorage.getItem('liked_' + id)) return;
    localStorage.setItem('liked_' + id, 'true');
    await _supabase.from('gossips').update({ likes: currentLikes + 1 }).eq('id', id);
    loadData();
}

async function approvePost(id) {
    await _supabase.from('gossips').update({ approved: true }).eq('id', id);
    loadData();
}

async function deletePost(id, isFeed) {
    // Pokud mažu z feedu (isFeed == true), zeptám se. Pokud z admina (ke schválení), smažu rovnou.
    if (isFeed) {
        if (!confirm("Delete post?")) return;
    }
    
    await _supabase.from('gossips').delete().eq('id', id);
    loadData();
}

async function submitGossip() {
    const person = document.getElementById('personInput').value.trim();
    const content = document.getElementById('gossipInput').value.trim();
    const file = document.getElementById('fileInput').files[0];
    if (!person || !content) return; // Odstraněn alert

    let imageUrl = null;
    if (file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const { data } = await _supabase.storage.from('gossip-images').upload(fileName, file);
        if (data) imageUrl = `${SUPABASE_URL}/storage/v1/object/public/gossip-images/${fileName}`;
    }
    await _supabase.from('gossips').insert([{ person, content, image_url: imageUrl }]);
    
    // Odstraněn alert o odeslání
    location.reload();
}

function handleLogin() {
    if (document.getElementById('adminPass').value === ADMIN_PASS) {
        localStorage.setItem('isInsiderAdmin', 'true');
        location.reload();
    } else alert("Error");
}
function logout() { localStorage.removeItem('isInsiderAdmin'); location.reload(); }

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
